<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timelesz Schedule</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="logo"><h1>timelesz</h1><p>Schedule</p></div>
        <div class="header-buttons">
            <button id="todayBtn">Today</button>
            <button id="settingBtn">⚙️</button>
        </div>
    </header>

    <section class="month-bar">
        <button id="prevMonth">‹</button>
        <h2 id="monthTitle"></h2>
        <button id="nextMonth">›</button>
    </section>

    <div class="week">
        <div>日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div>土</div>
    </div>
    <div id="calendar" class="calendar"></div>

    <section class="member-filter">
        <button data-member="ALL">ALL</button>
        <button data-member="SHORI">SHORI</button>
        <button data-member="FUMA">FUMA</button>
        <button data-member="SO">SO</button>
        <button data-member="TAKUTO">TAKUTO</button>
        <button data-member="YOSHITAKA">YOSHITAKA</button>
        <button data-member="MASAKI">MASAKI</button>
        <button data-member="SHUTO">SHUTO</button>
        <button data-member="TAIKI">TAIKI</button>
    </section>

    <section class="plan-panel">
        <h2 id="selectedDate">予定</h2>
        <div id="planList">日付をダブルタップして予定を追加</div>
    </section>

    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <h2>予定を追加/編集</h2>
            <select id="category"><option value="tv">📺 テレビ</option><option value="radio">📻 ラジオ</option></select>
            <select id="member"><option value="SHORI">SHORI</option><option value="FUMA">FUMA</option></select>
            <input id="titleInput" type="text" placeholder="タイトル">
            <input id="timeInput" type="time">
            <input id="placeInput" type="text" placeholder="場所">
            <textarea id="memoInput" placeholder="メモ"></textarea>
            <div class="modal-buttons">
                <button id="deleteBtn">削除</button>
                <button id="saveBtn">保存</button>
                <button id="closeBtn">閉じる</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
